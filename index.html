<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Meeting Transcriber Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a, #1e3a8a);
    color: white;
    min-height: 100vh;
    padding: 20px;
}

/* Glass Container */
.container {
    max-width: 900px;
    margin: auto;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

h1 {
    text-align: center;
    margin-bottom: 15px;
}

/* Controls */
.controls {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin-bottom: 15px;
}

select, button {
    padding: 12px 18px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    cursor: pointer;
    transition: 0.3s;
}

/* Buttons */
.start { background: linear-gradient(45deg, #22c55e, #16a34a); }
.stop { background: linear-gradient(45deg, #ef4444, #b91c1c); }
.download { background: linear-gradient(45deg, #3b82f6, #1d4ed8); }
.summaryBtn { background: linear-gradient(45deg, #f59e0b, #d97706); }

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(255,255,255,0.3);
}

/* Status Pulse */
.status {
    text-align: center;
    margin: 10px 0;
    font-size: 14px;
}

.listening {
    color: #22c55e;
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0% {opacity: 1;}
    50% {opacity: 0.4;}
    100% {opacity: 1;}
}

/* Panels */
.panel {
    margin-top: 15px;
    padding: 15px;
    border-radius: 15px;
    background: rgba(0,0,0,0.4);
    height: 220px;
    overflow-y: auto;
    text-align: left;
    white-space: pre-wrap;
    transition: 0.3s;
}

.panel:hover {
    box-shadow: 0 0 20px rgba(255,255,255,0.1);
}

h3 {
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h1>🎤 AI Meeting Transcriber Pro</h1>

    <div class="controls">
        <select id="language">
            <option value="en-US">English</option>
            <option value="ha-NG">Hausa (Experimental)</option>
        </select>

        <button class="start" onclick="start()">▶ Start</button>
        <button class="stop" onclick="stop()">⏹ Stop</button>
        <button class="summaryBtn" onclick="generateSummary()">🧠 Summary</button>
        <button class="download" onclick="downloadPDF()">📄 PDF</button>
    </div>

    <div id="status" class="status">Status: Idle</div>

    <h3>📄 Transcript</h3>
    <div id="transcript" class="panel"></div>

    <h3>🧠 Summary</h3>
    <div id="summary" class="panel"></div>
</div>

<script>
let recognition;
let finalText = "";

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onstart = () => {
        document.getElementById("status").innerHTML = "🎤 Listening...";
        document.getElementById("status").classList.add("listening");
    };

    recognition.onresult = (event) => {
        let interim = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
            let txt = event.results[i][0].transcript;
            if (event.results[i].isFinal) {
                finalText += txt + "\n";
            } else {
                interim += txt;
            }
        }
        document.getElementById("transcript").innerText = finalText + interim;
    };

    recognition.onerror = (e) => {
        document.getElementById("status").innerText = "Error: " + e.error;
    };

    recognition.onend = () => {
        document.getElementById("status").innerText = "Status: Stopped";
        document.getElementById("status").classList.remove("listening");
    };
} else {
    alert("Use Google Chrome for best performance");
}

function start() {
    finalText = "";
    document.getElementById("transcript").innerText = "";
    recognition.lang = document.getElementById("language").value;
    recognition.start();
}

function stop() {
    recognition.stop();
}

/* Better Summary Logic */
function generateSummary() {
    if (!finalText) return;

    let sentences = finalText.split(/[.!?]/);
    let clean = sentences.filter(s => s.trim().length > 20);

    let summary = clean.slice(0, 5).join(". ") + ".";

    document.getElementById("summary").innerText = summary || "No summary available.";
}

function downloadPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.text("MEETING TRANSCRIPT", 10, 10);
    let textLines = doc.splitTextToSize(finalText, 180);
    doc.text(textLines, 10, 20);

    doc.addPage();
    doc.text("SUMMARY", 10, 10);

    let summaryText = document.getElementById("summary").innerText;
    let sumLines = doc.splitTextToSize(summaryText, 180);
    doc.text(sumLines, 10, 20);

    doc.save("meeting.pdf");
}
</script>

</body>
</html>
